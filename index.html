<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vídeo</title>
<style>
body{
    margin:0;
    background:#000;
}
.video-container{
    position:relative;
    width:100%;
    height:100vh;
}
.video-container iframe{
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>
<body>

<div class="video-container">
    <iframe
        src="https://youtu.be/cCGu3EPcxeM"
        title="Vídeo"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
